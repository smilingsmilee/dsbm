# @package _global_

cdsb: False

# data
Dataset: afhq_cat
data:
  dataset: afhq_cat2dog
  image_size: 256
  channels: 3

# transfer
transfer: True
Dataset_transfer: afhq_dog

final_adaptive: False
adaptive_mean: False
mean_final: torch.zeros([${data.channels}, ${data.image_size}, ${data.image_size}])
var_final: 1 * torch.ones([${data.channels}, ${data.image_size}, ${data.image_size}])

# AFHQ data path — override with ++paths.afhq_path=... if different
paths:
  experiments_dir_name: experiments
  data_dir_name: data
  afhq_path: /kaggle/input/animal-faces/afhq

# device
device: cuda
num_workers: 2
pin_memory: True

# logging
log_stride: 100
gif_stride: 500
plot_npar: 4
test_npar: 50
test_batch_size: 4
cache_npar: 200
cache_batch_size: 8
num_repeat_data: 1
cache_refresh_stride: 500

# training
use_prev_net: True
ema: True
ema_rate: 0.999
grad_clipping: True
grad_clip: 1.0
batch_size: 4
num_iter: 5000
n_ipf: 10
lr: 0.0001

num_steps: 30
